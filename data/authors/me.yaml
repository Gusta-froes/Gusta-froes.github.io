bio: |
  Hi! I am a double-degree student in Physics and Engineering at the University of Campinas (Brazil) and the Institut Polytechnique de Paris (France). My interests lie broadly in quantum information theory and quantum foundations, with a particular focus on nonlocality, device-independent certification, quantum networks, and the use of convex optimization tools, especially semidefinite programming, to tackle these problems. Previously, I worked under the supervision of Peter Brown in the Quriosity group at Télécom Paris on DIQKD. I am currently working on my Master’s thesis under the supervision of Marc-Olivier Renou in the PhIQuS team at Inria Saclay / École Polytechnique.
